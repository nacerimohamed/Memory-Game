<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memory Game - Jeu de Mémoire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* حاوية اللعبة الرئيسية */
        .game-container {
            background: rgba(255, 248, 205, 0.9);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.5);
            padding: 20px 25px 35px;
            text-align: center;
            transition: all 0.2s ease;
            max-width: 800px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ffd966, #b87c2e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        .lang-switch {
            background: #2c2b26;
            border-radius: 50px;
            padding: 5px;
            display: flex;
            gap: 5px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: #f9eec1;
        }

        .lang-btn.active {
            background: #f4b942;
            color: #2c2b26;
        }

        .sub {
            color: #5a3e1b;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1rem;
            border-bottom: 2px dashed #c2a15b;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* لوحة الإحصائيات */
        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c2b26;
            padding: 12px 20px;
            border-radius: 100px;
            margin-bottom: 30px;
            color: #f9eec1;
            font-weight: bold;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), 0 4px 8px rgba(0,0,0,0.2);
            flex-wrap: wrap;
            gap: 10px;
        }

        .moves, .matches, .timer {
            background: #1e1d19;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 1.1rem;
            display: flex;
            gap: 8px;
            align-items: baseline;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.1);
        }

        .stats-panel span:first-child {
            font-size: 0.8rem;
            color: #e6c97e;
        }

        .stats-panel span:last-child {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd966;
            line-height: 1;
        }

        /* شبكة البطاقات */
        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            justify-items: center;
            align-items: center;
            margin-bottom: 30px;
        }

        /* تصميم البطاقة */
        .card {
            background: transparent;
            perspective: 600px;
            width: 100%;
            aspect-ratio: 3 / 4;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 10px 15px -5px rgba(0, 0, 0, 0.3);
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched {
            cursor: default;
            filter: drop-shadow(0 0 6px gold);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            box-sizing: border-box;
        }

        /* الوجه الخلفي (الظهر) */
        .card-back {
            background: repeating-linear-gradient(45deg, #4f7a3f, #4f7a3f 12px, #3b5e2b 12px, #3b5e2b 24px);
            border: 3px solid #f3d382;
            transform: rotateY(0deg);
            color: #ffecb3;
            font-size: 2.8rem;
        }

        .card-back::after {
            content: "?";
            opacity: 0.9;
            text-shadow: 2px 2px 0 #2b4a1a;
        }

        /* الوجه الأمامي (الصورة) */
        .card-front {
            background: #fffaf0;
            transform: rotateY(180deg);
            border: 3px solid #e7b42c;
            box-shadow: inset 0 0 0 2px white;
            color: #2c2b26;
        }

        /* رسالة النهاية */
        .message-area {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #261f10c9;
            backdrop-filter: blur(5px);
            display: inline-block;
            width: auto;
            padding: 10px 20px;
            border-radius: 40px;
            color: #f9eec1;
        }

        /* زر إعادة اللعبة */
        .reset-btn {
            background: #f4b942;
            border: none;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.2s;
            color: #2c2b26;
            box-shadow: 0 5px 0 #a25f1a;
            font-family: inherit;
        }

        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a25f1a;
        }

        /* استجابة للأجهزة الصغيرة */
        @media (max-width: 550px) {
            .board {
                gap: 8px;
            }
            .stats-panel {
                padding: 8px 12px;
            }
            .moves, .matches, .timer {
                padding: 3px 12px;
                font-size: 0.9rem;
            }
            .stats-panel span:last-child {
                font-size: 1.2rem;
            }
            .card-front, .card-back {
                font-size: 2rem;
            }
            h1 {
                font-size: 1.4rem;
            }
            .lang-btn {
                padding: 4px 12px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 450px) {
            .card-front, .card-back {
                font-size: 1.5rem;
            }
        }
        
        /* تعطيل التفاعل أثناء انتظار التقليب */
        .disable-click {
            pointer-events: none;
        }

        footer {
            font-size: 0.7rem;
            color: #836e3c;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <h1 id="gameTitle">🧠 Jeu de Mémoire 🃏</h1>
        <div class="lang-switch">
            <button class="lang-btn" data-lang="fr">🇫🇷 FR</button>
            <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
        </div>
    </div>
    <div class="sub" id="subText">✧ Retournez les cartes et trouvez les paires ✧</div>

    <div class="stats-panel">
        <div class="moves">🚀 <span id="moveLabel">Mouvements:</span> <span id="moveCount">0</span></div>
        <div class="matches">🏆 <span id="matchLabel">Paires:</span> <span id="matchCount">0</span></div>
        <div class="timer">⏱️ <span id="timerLabel">Temps:</span> <span id="timerDisplay">00:00</span></div>
    </div>

    <div class="board" id="gameBoard"></div>

    <div class="message-area" id="messageBox"></div>
    <button class="reset-btn" id="resetGame">🔄 Nouvelle Partie</button>
    <footer>⭐ Flip two cards, find the match! ⭐</footer>
</div>

<script>
    // ------------------- ترجمة النصوص ------------------
    const translations = {
        fr: {
            title: "🧠 Jeu de Mémoire 🃏",
            sub: "✧ Retournez les cartes et trouvez les paires ✧",
            moves: "Mouvements:",
            pairs: "Paires:",
            time: "Temps:",
            reset: "🔄 Nouvelle Partie",
            winMessage: (moves, time) => `🎉🎊 Félicitations ! Vous avez complété le jeu en ${moves} mouvement(s) et ${time} 🎊🎉`,
            defaultMessage: "✨ Retournez deux cartes et trouvez la paire ! ✨",
            pairFound: (current, total) => `✨ ${current} paires trouvées sur ${total} ✨`,
            footer: "⭐ Retournez deux cartes, trouvez la paire ! ⭐"
        },
        en: {
            title: "🧠 Memory Game 🃏",
            sub: "✧ Flip the cards and find the matches ✧",
            moves: "Moves:",
            pairs: "Matches:",
            time: "Time:",
            reset: "🔄 New Game",
            winMessage: (moves, time) => `🎉🎊 Congratulations! You completed the game in ${moves} moves and ${time} 🎊🎉`,
            defaultMessage: "✨ Flip two cards and find the match! ✨",
            pairFound: (current, total) => `✨ ${current} pairs found out of ${total} ✨`,
            footer: "⭐ Flip two cards, find the match! ⭐"
        }
    };

    let currentLang = 'fr'; // langue par défaut: français

    // Mettre à jour l'interface texte
    function updateUILanguage() {
        const t = translations[currentLang];
        document.getElementById('gameTitle').textContent = t.title;
        document.getElementById('subText').textContent = t.sub;
        document.getElementById('moveLabel').textContent = t.moves;
        document.getElementById('matchLabel').textContent = t.pairs;
        document.getElementById('timerLabel').textContent = t.time;
        document.getElementById('resetGame').textContent = t.reset;
        document.querySelector('footer').textContent = t.footer;
        
        // Mettre à jour le message si la partie est en cours ou terminée
        if (matchedPairs === ICONS.length) {
            messageBox.textContent = t.winMessage(moveCounter, formatTime(timerSeconds));
        } else {
            if (matchedPairs > 0) {
                messageBox.textContent = t.pairFound(matchedPairs, ICONS.length);
            } else {
                messageBox.textContent = t.defaultMessage;
            }
        }
        
        // Mettre à jour les boutons de langue actifs
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.dataset.lang === currentLang) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // ------------------- إعدادات الرموز (8 أزواج => 16 بطاقة) ------------------
    const ICONS = [
        "🐶", "🐱", "🐭", "🐹",
        "🐰", "🦊", "🐻", "🐼"
    ];
    
    let cardsData = [];
    let gameCards = [];
    let boardElement = document.getElementById('gameBoard');
    
    let moveCounter = 0;
    let matchedPairs = 0;
    let timerSeconds = 0;
    let timerInterval = null;
    let gameActive = true;
    let lockBoard = false;
    let firstCard = null;
    let secondCard = null;
    let firstCardId = null;
    let secondCardId = null;
    
    const moveSpan = document.getElementById('moveCount');
    const matchSpan = document.getElementById('matchCount');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const messageBox = document.getElementById('messageBox');
    const resetBtn = document.getElementById('resetGame');
    
    function formatTime(sec) {
        let minutes = Math.floor(sec / 60);
        let seconds = sec % 60;
        return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }
    
    function updateTimerUI() {
        timerDisplaySpan.textContent = formatTime(timerSeconds);
    }
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (gameActive && matchedPairs < ICONS.length) {
                timerSeconds++;
                updateTimerUI();
            } else if (matchedPairs === ICONS.length) {
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = null;
            }
        }, 1000);
    }
    
    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }
    
    function incrementMove() {
        moveCounter++;
        moveSpan.textContent = moveCounter;
    }
    
    function updateMatches() {
        matchSpan.textContent = matchedPairs;
        const t = translations[currentLang];
        if (matchedPairs === ICONS.length) {
            gameActive = false;
            stopTimer();
            messageBox.textContent = t.winMessage(moveCounter, formatTime(timerSeconds));
            lockBoard = true;
        } else {
            messageBox.textContent = t.pairFound(matchedPairs, ICONS.length);
        }
    }
    
    function resetBoardState() {
        firstCard = null;
        secondCard = null;
        firstCardId = null;
        secondCardId = null;
        lockBoard = false;
    }
    
    function checkMatch(cardA, cardB, idA, idB) {
        const iconA = cardsData[idA].icon;
        const iconB = cardsData[idB].icon;
        
        if (iconA === iconB) {
            cardsData[idA].matched = true;
            cardsData[idB].matched = true;
            
            const cardElementA = gameCards[idA];
            const cardElementB = gameCards[idB];
            cardElementA.classList.add('matched');
            cardElementB.classList.add('matched');
            cardElementA.classList.add('flipped');
            cardElementB.classList.add('flipped');
            
            matchedPairs++;
            updateMatches();
            resetBoardState();
        } else {
            setTimeout(() => {
                if (cardsData[idA].matched === false && cardsData[idB].matched === false) {
                    const cardElemA = gameCards[idA];
                    const cardElemB = gameCards[idB];
                    cardElemA.classList.remove('flipped');
                    cardElemB.classList.remove('flipped');
                }
                resetBoardState();
                if (!gameActive) lockBoard = true;
                else lockBoard = false;
            }, 800);
        }
    }
    
    function onCardClick(cardIndex) {
        if (lockBoard) return;
        if (!gameActive) return;
        if (cardsData[cardIndex].matched) return;
        
        const currentCardElement = gameCards[cardIndex];
        if (currentCardElement.classList.contains('flipped')) return;
        if (firstCard !== null && secondCard !== null) return;
        
        if (moveCounter === 0 && timerInterval === null && matchedPairs === 0) {
            startTimer();
        }
        
        currentCardElement.classList.add('flipped');
        
        if (firstCard === null) {
            firstCard = currentCardElement;
            firstCardId = cardIndex;
        } else if (secondCard === null && firstCardId !== cardIndex) {
            secondCard = currentCardElement;
            secondCardId = cardIndex;
            incrementMove();
            lockBoard = true;
            checkMatch(firstCard, secondCard, firstCardId, secondCardId);
        }
    }
    
    function initGame() {
        stopTimer();
        moveCounter = 0;
        matchedPairs = 0;
        timerSeconds = 0;
        gameActive = true;
        lockBoard = false;
        firstCard = null;
        secondCard = null;
        firstCardId = null;
        secondCardId = null;
        
        moveSpan.textContent = "0";
        matchSpan.textContent = "0";
        updateTimerUI();
        
        const t = translations[currentLang];
        messageBox.textContent = t.defaultMessage;
        
        let deck = [...ICONS, ...ICONS];
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        
        cardsData = deck.map((icon, idx) => ({
            icon: icon,
            matched: false,
            cardId: idx
        }));
        
        boardElement.innerHTML = "";
        gameCards = [];
        
        deck.forEach((icon, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                onCardClick(idx);
            });
            
            const inner = document.createElement('div');
            inner.className = 'card-inner';
            
            const front = document.createElement('div');
            front.className = 'card-front';
            front.textContent = icon;
            
            const back = document.createElement('div');
            back.className = 'card-back';
            
            inner.appendChild(front);
            inner.appendChild(back);
            card.appendChild(inner);
            
            boardElement.appendChild(card);
            gameCards.push(card);
        });
    }
    
    function resetAndRestart() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        initGame();
        gameActive = true;
        lockBoard = false;
        const t = translations[currentLang];
        messageBox.textContent = t.defaultMessage;
    }
    
    // Changer la langue
    function setLanguage(lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        updateUILanguage();
        // Mettre à jour le message sans perdre l'état du jeu
        const t = translations[currentLang];
        if (matchedPairs === ICONS.length) {
            messageBox.textContent = t.winMessage(moveCounter, formatTime(timerSeconds));
        } else if (matchedPairs > 0) {
            messageBox.textContent = t.pairFound(matchedPairs, ICONS.length);
        } else {
            messageBox.textContent = t.defaultMessage;
        }
    }
    
    // Événements pour les boutons de langue
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            setLanguage(btn.dataset.lang);
        });
    });
    
    resetBtn.addEventListener('click', () => {
        resetAndRestart();
    });
    
    initGame();
    updateUILanguage();
</script>
</body>
</html>
